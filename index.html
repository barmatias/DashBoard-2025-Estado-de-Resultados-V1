              <KPICard label="G. Comerciales" value={t.gcReal} color="#f97316"
                delta={((t.gcReal-t.gcProy)/Math.abs(t.gcProy)*100)}/>
              <KPICard label="G. Administrativos" value={t.gaReal} color="#a855f7"
                delta={((t.gaReal-t.gaProy)/Math.abs(t.gaProy)*100)}/>
              <KPICard label="Resultado Neto" value={t.netoReal} color={t.netoReal>=0?"#22c55e":"#ef4444"}/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 16px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Evolución Mensual de Costos y Gastos (en millones $)</h3>
                <ResponsiveContainer width="100%" height={250}>
                  <BarChart data={chartData} margin={{top:0,right:0,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="name" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${v} M`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v)=>[`$ ${v} M`]}/>
                    <Legend wrapperStyle={{fontSize:10}}/>
                    <Bar dataKey="Costo Ventas" fill="#ef4444" stackId="a"/>
                    <Bar dataKey="G. Comerciales" fill="#f97316" stackId="a"/>
                    <Bar dataKey="G. Administrativos" fill="#a855f7" stackId="a"/>
                    <Bar dataKey="Impuestos" fill="#ec4899" stackId="a"/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 16px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Distribución de Egresos Anuales</h3>
                <ResponsiveContainer width="100%" height={250}>
                  <PieChart>
                    <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100}
                      dataKey="value" nameKey="name" label={({name,percent})=>`${(percent*100).toFixed(0)}%`}
                      labelLine={false}>
                      {pieData.map((e,i)=><Cell key={i} fill={COLORS.chart[i]}/>)}
                    </Pie>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v)=>[`$ ${v} M`]}/>
                    <Legend wrapperStyle={{fontSize:10}}/>
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
              <h3 style={{margin:"0 0 16px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Top 15 Gastos Operativos</h3>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {RAW_DATA_SUMMARY.topGastos.map((g,i)=>{
                  const maxVal = RAW_DATA_SUMMARY.topGastos[0].real;
                  const pct = (g.real/maxVal*100);
                  const color = g.cat==="Administrativos" ? "#a855f7":"#f97316";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{width:18,fontSize:10,color:"#64748b",textAlign:"right"}}>{i+1}</span>
                      <span style={{width:220,fontSize:11,color:"#e2e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.nombre}</span>
                      <div style={{flex:1,height:18,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
                        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,opacity:0.8}}/>
                      </div>
                      <span style={{width:70,fontSize:11,color:color,textAlign:"right",fontFamily:"monospace"}}>{fmt(g.real)}</span>
                      <span style={{width:70,fontSize:10,color:"#64748b",textAlign:"right"}}>{g.cat}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── ESTADO DE RESULTADOS ── */}
        {tab==="pyg" && (() => {
          const accountMap = RAW_DATA_SUMMARY.accountMap;
          const catPeriod  = RAW_DATA_SUMMARY.catPeriod;
          const calcPropFijo = (catName) => {
            const cc = accountMap.filter(a => a.cat === catName && a.clasif);
            if (!cc.length) return 0.5;
            return cc.filter(a => a.clasif === "Fijo").length / cc.length;
          };
          const propFijoGC = calcPropFijo("Gastos Comerciales");
          const propFijoGF = calcPropFijo("Gastos Financieros");
          const peData = MONTHS.map((m, i) => {
            const ventas = catPeriod["Ventas"][m] || 0;
            const cmv    = catPeriod["Costo de Ventas"][m] || 0;
            const gc     = catPeriod["Gastos Comerciales"][m] || 0;
            const ga     = catPeriod["Gastos Administrativos"][m] || 0;
            const gf     = catPeriod["Gastos Financieros"][m] || 0;
            const costosFijos     = gc*propFijoGC + ga*0.72 + gf*propFijoGF;
            const costosVariables = cmv + gc*(1-propFijoGC) + ga*0.28 + gf*(1-propFijoGF);
            const mc   = ventas > 0 ? (ventas - costosVariables) / ventas : 0;
            const pe   = mc > 0 ? costosFijos / mc : 0;
            const ms   = ventas - pe;
            return {
              mes: MONTH_LABELS[i], ventas: Math.round(ventas/1e6), pe: Math.round(pe/1e6),
              costosFijos: Math.round(costosFijos/1e6), costosVariables: Math.round(costosVariables/1e6),
              margenContrib: Math.round(mc*1000)/10,
              cobertura: pe > 0 ? Math.round(ventas/pe*1000)/10 : 0,
              margenSeguridad: Math.round(ms/1e6),
              superavit: ventas >= pe,
            };
          });
          const TV = MONTHS.reduce((s,m)=>s+(catPeriod["Ventas"][m]||0),0);
          const TC = MONTHS.reduce((s,m)=>s+(catPeriod["Costo de Ventas"][m]||0),0);
          const TG = MONTHS.reduce((s,m)=>s+(catPeriod["Gastos Comerciales"][m]||0),0);
          const TA = MONTHS.reduce((s,m)=>s+(catPeriod["Gastos Administrativos"][m]||0),0);
          const TF = MONTHS.reduce((s,m)=>s+(catPeriod["Gastos Financieros"][m]||0),0);
          const totFijo = TG*propFijoGC + TA*0.72 + TF*propFijoGF;
          const totVar  = TC + TG*(1-propFijoGC) + TA*0.28 + TF*(1-propFijoGF);
          const mcA  = TV > 0 ? (TV - totVar) / TV : 0;
          const peA  = mcA > 0 ? totFijo / mcA : 0;
          const msA  = TV > 0 ? ((TV - peA) / TV * 100) : 0;
          const nSup = peData.filter(d=>d.superavit).length;
          return (
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <SectionTitle icon="📋">Estado de Resultados</SectionTitle>
              <div style={{background:"#0f172a",borderRadius:12,padding:"20px",border:"1px solid #1e293b"}}>
                <PYGTable pyg={pyg}/>
              </div>
              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 16px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Resultado Neto Mensual (en millones $)</h3>
                <ResponsiveContainer width="100%" height={200}>
                  <LineChart data={chartData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="name" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${v} M`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={v=>[`$ ${v} M`]}/>
                    <Line type="monotone" dataKey="Resultado Neto" stroke="#22c55e" strokeWidth={2} dot={{r:4,fill:"#22c55e"}}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>

              <SectionTitle icon="\u2696\uFE0F">Punto de Equilibrio</SectionTitle>

              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14}}>
                {[
                  {l:"PE Anual",v:`$ ${Math.round(peA/1e9*10)/10} MM`,s:"Ventas mín. para cubrir costos",c:"#eab308"},
                  {l:"Ventas Reales",v:`$ ${Math.round(TV/1e9*10)/10} MM`,s:`${msA>0?"✅ Superávit":"⚠️ Déficit"} vs PE`,c:msA>0?"#22c55e":"#ef4444"},
                  {l:"Margen de Seguridad",v:`${Math.round(msA*10)/10}%`,s:`$ ${Math.round((TV-peA)/1e9*10)/10} MM sobre el PE`,c:msA>0?"#22c55e":"#ef4444"},
                  {l:"Margen Contribución",v:`${Math.round(mcA*1000)/10}%`,s:"(Ventas − C.Variable) / Ventas",c:"#3b82f6"},
                  {l:"Costos Fijos Anuales",v:`$ ${Math.round(totFijo/1e9*10)/10} MM`,s:"GC Fijo + GA Fijo + GF Fijo",c:"#a855f7"},
                  {l:"Meses en Superávit",v:`${nSup} / 12`,s:"Meses que superaron el PE",c:nSup>=10?"#22c55e":nSup>=6?"#eab308":"#ef4444"},
                ].map((k,i)=>(
                  <div key={i} style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",border:`1px solid ${k.c}33`,borderRadius:12,padding:"18px 20px",display:"flex",flexDirection:"column",gap:4}}>
                    <span style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em"}}>{k.l}</span>
                    <span style={{fontSize:22,fontWeight:700,color:k.c,fontFamily:"'Courier New',monospace"}}>{k.v}</span>
                    <span style={{fontSize:10,color:"#475569"}}>{k.s}</span>
                  </div>
                ))}
              </div>

              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Evolución Mensual: Ventas vs Punto de Equilibrio ($ millones)</h3>
                <p style={{margin:"0 0 16px",fontSize:11,color:"#475569"}}>🟢 Verde = mes superó el PE · 🔴 Rojo = mes bajo el PE · 🟡 Amarillo = nivel del PE</p>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={peData} margin={{top:10,right:20,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="mes" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${(v/1000).toFixed(0)} MM`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v,name)=>[`$ ${v.toLocaleString()} M`,name]}/>
                    <Legend wrapperStyle={{fontSize:11}}/>
                    <Bar dataKey="ventas" name="Ventas Reales" radius={[4,4,0,0]}>
                      {peData.map((d,i)=>(<Cell key={i} fill={d.superavit?"#22c55e":"#ef4444"} fillOpacity={0.85}/>))}
                    </Bar>
                    <Bar dataKey="pe" name="Punto de Equilibrio" fill="#eab308" fillOpacity={0.5} radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Margen de Seguridad Mensual ($ millones sobre/bajo el PE)</h3>
                <p style={{margin:"0 0 16px",fontSize:11,color:"#475569"}}>Positivo = colchón disponible. Negativo = ventas insuficientes para cubrir costos fijos.</p>
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={peData} margin={{top:10,right:20,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="mes" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${(v/1000).toFixed(1)} MM`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v,name)=>[`$ ${v.toLocaleString()} M`,name]}/>
                    <Bar dataKey="margenSeguridad" name="Margen de Seguridad" radius={[4,4,0,0]}>
                      {peData.map((d,i)=>(<Cell key={i} fill={d.margenSeguridad>=0?"#22c55e":"#ef4444"} fillOpacity={0.9}/>))}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div style={{background:"#0f172a",borderRadius:12,border:"1px solid #1e293b",overflow:"hidden"}}>
                <div style={{padding:"14px 20px",borderBottom:"1px solid #1e293b",background:"#0a1628"}}>
                  <h3 style={{margin:0,fontSize:13,color:"#94a3b8",fontWeight:500}}>Detalle Mensual del Punto de Equilibrio (en millones $)</h3>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:11,width:"100%",minWidth:900}}>
                    <thead>
                      <tr style={{background:"#0d1f35"}}>
                        {["Mes","Ventas","PE","C. Fijos","C. Variables","M. Contrib.","M. Seguridad","Cobertura","Estado"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:h==="Mes"||h==="Estado"?"left":"right",color:"#64748b",fontWeight:600,borderBottom:"2px solid #334155",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {peData.map((d,i)=>(
                        <tr key={i} style={{background:i%2===0?"#050d1a":"#070f1e",borderBottom:"1px solid #0f172a"}}>
                          <td style={{padding:"9px 12px",color:"#e2e8f0",fontWeight:600}}>{d.mes}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace"}}>{d.ventas.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#eab308",fontFamily:"monospace"}}>{d.pe.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#a855f7",fontFamily:"monospace"}}>{d.costosFijos.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#f97316",fontFamily:"monospace"}}>{d.costosVariables.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:600,color:d.margenContrib>30?"#22c55e":d.margenContrib>15?"#eab308":"#ef4444"}}>{d.margenContrib}%</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:600,color:d.margenSeguridad>=0?"#22c55e":"#ef4444"}}>{d.margenSeguridad>=0?"+":""}{d.margenSeguridad.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",color:d.cobertura>=100?"#22c55e":"#ef4444"}}>{d.cobertura.toFixed(1)}%</td>
                          <td style={{padding:"9px 12px"}}>
                            <span style={{background:d.superavit?"#22c55e22":"#ef444422",color:d.superavit?"#22c55e":"#ef4444",padding:"3px 10px",borderRadius:10,fontSize:10,fontWeight:700}}>
                              {d.superavit?"✅ Superávit":"⚠️ Déficit"}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr style={{background:"#0a1628",borderTop:"2px solid #334155"}}>
                        <td style={{padding:"10px 12px",color:"#e2e8f0",fontWeight:700}}>ANUAL</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace",fontWeight:700}}>{Math.round(TV/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#eab308",fontFamily:"monospace",fontWeight:700}}>{Math.round(peA/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#a855f7",fontFamily:"monospace",fontWeight:700}}>{Math.round(totFijo/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#f97316",fontFamily:"monospace",fontWeight:700}}>{Math.round(totVar/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#3b82f6",fontFamily:"monospace",fontWeight:700}}>{Math.round(mcA*1000)/10}%</td>
                        <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:msA>=0?"#22c55e":"#ef4444"}}>{msA>=0?"+":""}{Math.round(msA*10)/10}%</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace",fontWeight:700}}>{Math.round(TV/peA*100*10)/10}%</td>
                        <td style={{padding:"10px 12px"}}>
                          <span style={{background:"#22c55e22",color:"#22c55e",padding:"3px 10px",borderRadius:10,fontSize:10,fontWeight:700}}>{nSup}/12 meses</span>
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── DETALLE POR CUENTA ── */}
        {tab==="detalle" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <SectionTitle icon="🔍">Detalle por Cuenta Contable</SectionTitle>

            {/* Filtros fila 1: búsqueda + área */}
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <input
                value={searchAccount}
                onChange={e=>setSearchAccount(e.target.value)}
                placeholder="Buscar por código, nombre, categoría o área..."
                style={{
                  flex:"1 1 300px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,
                  padding:"10px 16px",color:"#e2e8f0",fontSize:13,fontFamily:"inherit",
                  outline:"none",boxSizing:"border-box"
                }}
              />
              <select
                value={filterArea}
                onChange={e=>setFilterArea(e.target.value)}
                style={{
                  background:"#0f172a",border:"1px solid #334155",borderRadius:8,
                  padding:"10px 14px",color: filterArea?"#22c55e":"#64748b",
                  fontSize:12,fontFamily:"inherit",outline:"none",cursor:"pointer",minWidth:200
                }}
              >
                <option value="">🏢 Todas las áreas</option>
                {ALL_AREAS.filter(Boolean).map(a=>(
                  <option key={a} value={a}>{a}</option>
                ))}
              </select>
              {/* Toggle Fijo / Variable */}
              <div style={{display:"flex",borderRadius:8,border:"1px solid #334155",overflow:"hidden"}}>
                {["","Fijo","Variable"].map(v=>(
                  <button key={v} onClick={()=>setFilterClasif(v)} style={{
                    background: filterClasif===v ? (v==="Fijo"?"#3b82f633":v==="Variable"?"#f9731633":"#1e293b") : "#0f172a",
                    border:"none",
                    borderRight: v!=="Variable" ? "1px solid #334155" : "none",
                    padding:"10px 16px",
                    color: filterClasif===v ? (v==="Fijo"?"#3b82f6":v==="Variable"?"#f97316":"#e2e8f0") : "#64748b",
                    fontSize:12,cursor:"pointer",fontWeight:filterClasif===v?700:400,
                    transition:"all .15s",fontFamily:"inherit"
                  }}>
                    {v===""?"Todos":v==="Fijo"?"🔒 Fijo":"📈 Variable"}
                  </button>
                ))}
              </div>
            </div>

            {/* Chips de áreas */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {ALL_AREAS.filter(Boolean).map(a => {
                const count = RAW_DATA_SUMMARY.accountMap.filter(ac=>(ac.area||"")===a).length;
                const areaColors = {
                  "Comercial":"#22c55e","Compras":"#3b82f6","Logistica":"#f97316",
                  "Operaciones":"#a855f7","Marketing":"#ec4899","Recursos Humanos":"#14b8a6",
                  "Sistemas":"#6366f1","Gestoria":"#eab308","Finanzas":"#06b6d4",
                  "Administracion":"#94a3b8","Administracion en Sucursales":"#cbd5e1",
                  "PostVenta":"#fb923c"
                };
                const col = areaColors[a]||"#64748b";
                const active = filterArea===a;
                return (
                  <button key={a} onClick={()=>setFilterArea(active?"":a)} style={{
                    background: active?`${col}33`:"#0f172a",
                    border:`1px solid ${active?col:"#1e293b"}`,
                    borderRadius:20, padding:"4px 12px",
                    color: active?col:"#64748b",
                    fontSize:11,cursor:"pointer",fontWeight:active?700:400,transition:"all .15s"
                  }}>
                    {a} <span style={{opacity:0.7}}>({count})</span>
                  </button>
                );
              })}
            </div>

            {/* Tabla */}
            <div style={{background:"#0f172a",borderRadius:12,border:"1px solid #1e293b",overflow:"hidden"}}>
              <div style={{padding:"10px 16px",background:"#0a0f1e",borderBottom:"1px solid #1e293b",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:11,color:"#64748b"}}>
                  {filteredAccounts.length} cuenta{filteredAccounts.length!==1?"s":""} encontrada{filteredAccounts.length!==1?"s":""}
                  {filterArea && <span style={{color:"#22c55e",marginLeft:8}}>· área: <strong>{filterArea}</strong></span>}
                  {filterClasif && <span style={{color: filterClasif==="Fijo"?"#3b82f6":"#f97316",marginLeft:8}}>· <strong>{filterClasif==="Fijo"?"🔒 Fijo":"📈 Variable"}</strong></span>}
                </span>
                {(searchAccount||filterArea||filterClasif) && (
                  <button onClick={()=>{setSearchAccount("");setFilterArea("");setFilterClasif("");}} style={{
                    background:"none",border:"none",color:"#ef4444",fontSize:11,cursor:"pointer"
                  }}>✕ Limpiar filtros</button>
                )}
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#0a0f1e"}}>
                    <th style={{padding:"10px 16px",textAlign:"left",color:"#94a3b8",fontWeight:500,whiteSpace:"nowrap"}}>Código</th>
                    <th style={{padding:"10px 16px",textAlign:"left",color:"#94a3b8",fontWeight:500}}>Nombre</th>
                    <th style={{padding:"10px 16px",textAlign:"left",color:"#94a3b8",fontWeight:500}}>Categoría</th>
                    <th style={{padding:"10px 16px",textAlign:"left",color:"#94a3b8",fontWeight:500}}>Área Responsable</th>
                    <th style={{padding:"10px 16px",textAlign:"center",color:"#94a3b8",fontWeight:500}}>Clasificación</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredAccounts.slice(0,120).map((a,i)=>{
                    const catColors = {
                      "Ventas":"#22c55e","Costo de Ventas":"#ef4444","Costos Comerciales":"#f87171",
                      "Gastos Comerciales":"#f97316","Gastos Administrativos":"#a855f7",
                      "Gastos Financieros":"#3b82f6","Gastos de Personal":"#14b8a6",
                      "Gastos de Cobranzas":"#ec4899","Impuestos":"#ec4899","Otros Ingresos":"#14b8a6"
                    };
                    const areaColors = {
                      "Comercial":"#22c55e","Compras":"#3b82f6","Logistica":"#f97316",
                      "Operaciones":"#a855f7","Marketing":"#ec4899","Recursos Humanos":"#14b8a6",
                      "Sistemas":"#6366f1","Gestoria":"#eab308","Finanzas":"#06b6d4",
                      "Administracion":"#94a3b8","Administracion en Sucursales":"#cbd5e1",
                      "PostVenta":"#fb923c"
                    };
                    const col = catColors[a.cat]||"#94a3b8";
                    const aCol = a.area ? (areaColors[a.area]||"#64748b") : "#334155";
                    return (
                      <tr key={i} style={{borderTop:"1px solid #1e293b",transition:"background 0.15s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#1e293b"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <td style={{padding:"10px 16px",color:"#94a3b8",fontFamily:"monospace",whiteSpace:"nowrap"}}>{a.codigo}</td>
                        <td style={{padding:"10px 16px",color:"#e2e8f0"}}>{a.nombre}</td>
                        <td style={{padding:"10px 16px"}}>
                          <span style={{background:`${col}22`,color:col,padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>
                            {a.cat}
                          </span>
                        </td>
                        <td style={{padding:"10px 16px"}}>
                          {a.area ? (
                            <span style={{background:`${aCol}18`,color:aCol,padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,whiteSpace:"nowrap",border:`1px solid ${aCol}33`}}>
                              {a.area}
                            </span>
                          ) : (
                            <span style={{color:"#334155",fontSize:11,fontStyle:"italic"}}>sin asignar</span>
                          )}
                        </td>
                        <td style={{padding:"10px 16px",textAlign:"center"}}>
                          {a.clasif ? (
                            <span style={{
                              background: a.clasif==="Fijo"?"#3b82f622":"#f9731622",
                              color: a.clasif==="Fijo"?"#3b82f6":"#f97316",
                              border: `1px solid ${a.clasif==="Fijo"?"#3b82f644":"#f9731644"}`,
                              padding:"3px 12px",borderRadius:12,fontSize:11,fontWeight:700,whiteSpace:"nowrap"
                            }}>
                              {a.clasif==="Fijo"?"🔒 Fijo":"📈 Variable"}
                            </span>
                          ) : (
                            <span style={{color:"#334155",fontSize:11}}>—</span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {filteredAccounts.length > 120 && (
                <div style={{padding:"12px 16px",color:"#64748b",fontSize:12,borderTop:"1px solid #1e293b"}}>
                  Mostrando 120 de {filteredAccounts.length} cuentas. Refiná la búsqueda para ver más.
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── SUCURSALES ── */}
        {tab==="sucursales" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <SectionTitle icon="🏬">Análisis por Sucursal</SectionTitle>

            {/* Sales vs Expenses per branch */}
            <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
              <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Ventas vs Gastos por Sucursal (en millones $)</h3>
              <p style={{margin:"0 0 16px",fontSize:11,color:"#64748b"}}>Comparativo de ingresos por ventas vs estructura de costos — 15 sucursales con datos de ventas</p>
              <ResponsiveContainer width="100%" height={340}>
                <BarChart
                  data={Object.keys(RAW_DATA_SUMMARY.ventasPorSucursal).map(suc => ({
                    name: suc.length > 14 ? suc.slice(0,13)+"…" : suc,
                    fullName: suc,
                    Ventas: Math.round((RAW_DATA_SUMMARY.ventasPorSucursal[suc]||0)/1e6),
                    Gastos: Math.round((RAW_DATA_SUMMARY.sucursales[suc]||0)/1e6),
                  })).sort((a,b)=>b.Ventas-a.Ventas)}
                  margin={{top:0,right:10,left:0,bottom:40}}
                >
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                  <XAxis dataKey="name" tick={{fontSize:9,fill:"#94a3b8"}} angle={-30} textAnchor="end"/>
                  <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${v} M`}/>
                  <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}}
                    formatter={(v,name)=>[`$ ${v} M`, name]}
                    labelFormatter={(l,p)=>p?.[0]?.payload?.fullName||l}
                  />
                  <Legend wrapperStyle={{fontSize:10}}/>
                  <Bar dataKey="Ventas" fill="#22c55e" radius={[3,3,0,0]}/>
                  <Bar dataKey="Gastos" fill="#ef4444" radius={[3,3,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
              <h3 style={{margin:"0 0 16px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Gastos Totales por Sucursal (en millones $)</h3>
              <ResponsiveContainer width="100%" height={320}>
                <BarChart data={sucursalData} layout="vertical" margin={{left:120}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false}/>
                  <XAxis type="number" tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${v} M`}/>
                  <YAxis type="category" dataKey="name" tick={{fontSize:10,fill:"#e2e8f0"}} width={115}/>
                  <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={v=>[`$ ${v} M`]}/>
                  <Bar dataKey="total" fill="#3b82f6" radius={[0,4,4,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
              {Object.entries(RAW_DATA_SUMMARY.sucursales).sort((a,b)=>b[1]-a[1]).map(([nombre,gasto],i)=>{
                const ventas = RAW_DATA_SUMMARY.ventasPorSucursal[nombre]||0;
                const balance = ventas - gasto;
                return (
                  <div key={i} style={{background:"#0f172a",border:`1px solid ${ventas>0&&balance>0?"#22c55e44":"#334155"}`,borderRadius:8,padding:"14px 16px"}}>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{i+1}. {nombre}</div>
                    {ventas > 0 && (
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,color:"#64748b"}}>Ventas</span>
                        <span style={{fontSize:12,color:"#22c55e",fontFamily:"monospace"}}>{fmt(ventas)}</span>
                      </div>
                    )}
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:"#64748b"}}>Gastos</span>
                      <span style={{fontSize:12,color:"#ef4444",fontFamily:"monospace"}}>{fmt(gasto)}</span>
                    </div>
                    {ventas > 0 && (
                      <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #1e293b",paddingTop:4,marginTop:4}}>
                        <span style={{fontSize:11,color:"#64748b"}}>Balance</span>
                        <span style={{fontSize:12,color:balance>0?"#22c55e":"#ef4444",fontFamily:"monospace",fontWeight:700}}>
                          {balance>0?"+":""}{fmt(balance)}
                        </span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── ABSORCIÓN DE COSTOS ── */}
        {tab==="absorcion" && (() => {
          // ─── Datos base ───────────────────────────────────────────────
          const catP   = RAW_DATA_SUMMARY.catPeriod;
          const vsm    = RAW_DATA_SUMMARY.ventasSucursalMes;
          const vps    = RAW_DATA_SUMMARY.ventasPorSucursal;
          const sucGto = RAW_DATA_SUMMARY.sucursales;

          // Unidades productivas (tienen ventas en Cubo Ventas)
          const PROD = Object.keys(vps);

          // Unidades de soporte: todas las que tienen gastos pero no tienen ventas
          const SOPORTE = Object.keys(sucGto).filter(s => !vps[s]);

          // Total costos de soporte anuales
          const totalSoporte = SOPORTE.reduce((s, k) => s + (sucGto[k] || 0), 0);

          // Total ventas productivas anuales
          const totalVentasProd = PROD.reduce((s, k) => s + (vps[k] || 0), 0);

          // Cuota de absorción por sucursal = (ventas_suc / total_ventas_prod) * total_soporte
          const cuotaAbsorcion = {};
          PROD.forEach(s => {
            cuotaAbsorcion[s] = totalSoporte * (vps[s] / totalVentasProd);
          });

          // ─── PE con absorción por sucursal ────────────────────────────
          // Gastos directos por sucursal (del dato sucursales, solo productivas)
          // Margen de contribución individual: usamos MC% global ya que no hay
          // desglose fijo/variable por sucursal — pero sí ponderamos por ventas
          const accountMap = RAW_DATA_SUMMARY.accountMap;
          const calcPropFijo = (catName) => {
            const cc = accountMap.filter(a => a.cat === catName && a.clasif);
            if (!cc.length) return 0.5;
            return cc.filter(a => a.clasif === "Fijo").length / cc.length;
          };
          const propFijoGC = calcPropFijo("Gastos Comerciales");
          const propFijoGF = calcPropFijo("Gastos Financieros");

          // Totales anuales P&G
          const TV  = MONTHS.reduce((s,m)=>s+(catP["Ventas"][m]||0),0);
          const TC  = MONTHS.reduce((s,m)=>s+(catP["Costo de Ventas"][m]||0),0);
          const TGC = MONTHS.reduce((s,m)=>s+(catP["Gastos Comerciales"][m]||0),0);
          const TGA = MONTHS.reduce((s,m)=>s+(catP["Gastos Administrativos"][m]||0),0);
          const TGF = MONTHS.reduce((s,m)=>s+(catP["Gastos Financieros"][m]||0),0);

          const totFijoGlobal = TGC*propFijoGC + TGA*0.72 + TGF*propFijoGF;
          const totVarGlobal  = TC + TGC*(1-propFijoGC) + TGA*0.28 + TGF*(1-propFijoGF);
          const mcGlobal      = TV > 0 ? (TV - totVarGlobal) / TV : 0;

          // PE global sin absorción
          const peSimple = mcGlobal > 0 ? totFijoGlobal / mcGlobal : 0;

          // PE global con absorción (los costos de soporte son 100% fijos)
          const totFijoConAbsorc = totFijoGlobal + totalSoporte;
          const peConAbsorc = mcGlobal > 0 ? totFijoConAbsorc / mcGlobal : 0;

          const impactoAbsorc    = peConAbsorc - peSimple;
          const impactoAbsorcPct = peSimple > 0 ? (impactoAbsorc / peSimple * 100) : 0;

          // ─── Tabla por sucursal con PE absorbido ──────────────────────
          const tablaSuc = PROD.map(suc => {
            const ventasSuc   = vps[suc] || 0;
            const gastoDir    = sucGto[suc] || 0;
            const cuota       = cuotaAbsorcion[suc] || 0;
            const pctVentas   = totalVentasProd > 0 ? ventasSuc / totalVentasProd : 0;

            // Costos directos de la sucursal proporcionales a su participación en ventas
            const fijoDir = (TGC*propFijoGC + TGA*0.72 + TGF*propFijoGF) * pctVentas;
            const varDir  = (TC + TGC*(1-propFijoGC) + TGA*0.28 + TGF*(1-propFijoGF)) * pctVentas;
            const mcSuc   = ventasSuc > 0 ? (ventasSuc - varDir) / ventasSuc : 0;

            const peDirSuc    = mcSuc > 0 ? fijoDir / mcSuc : 0;
            const peAbsorcSuc = mcSuc > 0 ? (fijoDir + cuota) / mcSuc : 0;
            const msDir       = ventasSuc - peDirSuc;
            const msAbsorc    = ventasSuc - peAbsorcSuc;
            const cobDir      = peDirSuc > 0 ? ventasSuc / peDirSuc * 100 : 0;
            const cobAbsorc   = peAbsorcSuc > 0 ? ventasSuc / peAbsorcSuc * 100 : 0;

            return {
              suc, ventasSuc, gastoDir, cuota,
              pctVentas: Math.round(pctVentas * 1000) / 10,
              peDirSuc: Math.round(peDirSuc / 1e6),
              peAbsorcSuc: Math.round(peAbsorcSuc / 1e6),
              msDir: Math.round(msDir / 1e6),
              msAbsorc: Math.round(msAbsorc / 1e6),
              cobDir: Math.round(cobDir * 10) / 10,
              cobAbsorc: Math.round(cobAbsorc * 10) / 10,
              deltaMS: Math.round((msAbsorc - msDir) / 1e6),
              superavitDir: msDir >= 0,
              superavitAbsorc: msAbsorc >= 0,
            };
          }).sort((a,b) => b.ventasSuc - a.ventasSuc);

          // ─── Evolución mensual PE con vs sin absorción ────────────────
          // Distribuir costos soporte por mes proporcionalmente a ventas del mes
          const totalVentasMes = MONTHS.map(m =>
            Object.values(vsm).reduce((s, mv) => s + (mv[m] || 0), 0)
          );
          const totalSoporteMes = MONTHS.map((m, i) => {
            // Prorratear el costo anual de soporte según proporción de ventas del mes
            const pct = TV > 0 ? totalVentasMes[i] / TV : 1/12;
            return totalSoporte * pct;
          });

          const peEvol = MONTHS.map((m, i) => {
            const ventas = catP["Ventas"][m] || 0;
            const cmv    = catP["Costo de Ventas"][m] || 0;
            const gc     = catP["Gastos Comerciales"][m] || 0;
            const ga     = catP["Gastos Administrativos"][m] || 0;
            const gf     = catP["Gastos Financieros"][m] || 0;
            const sopm   = totalSoporteMes[i];

            const fijoMes  = gc*propFijoGC + ga*0.72 + gf*propFijoGF;
            const varMes   = cmv + gc*(1-propFijoGC) + ga*0.28 + gf*(1-propFijoGF);
            const mc       = ventas > 0 ? (ventas - varMes) / ventas : 0;
            const peSim    = mc > 0 ? fijoMes / mc : 0;
            const peAbs    = mc > 0 ? (fijoMes + sopm) / mc : 0;
            return {
              mes: MONTH_LABELS[i],
              ventas: Math.round(ventas/1e6),
              peSim: Math.round(peSim/1e6),
              peAbs: Math.round(peAbs/1e6),
              soporte: Math.round(sopm/1e6),
              superSim: ventas >= peSim,
              superAbs: ventas >= peAbs,
            };
          });

          // ─── Render ───────────────────────────────────────────────────
          return (
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <SectionTitle icon="📐">Absorción de Costos de Soporte</SectionTitle>
              <p style={{margin:"-8px 0 0",fontSize:12,color:"#475569",lineHeight:1.7}}>
                Los costos de <strong style={{color:"#94a3b8"}}>Casa Central, Depósitos y Postventa Rosario</strong> (${Math.round(totalSoporte/1e6).toLocaleString()} M anuales)
                se distribuyen entre las sucursales productivas en proporción a sus ventas.
                Esto eleva el Punto de Equilibrio real respecto al cálculo directo.
              </p>

              {/* KPIs comparativos */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:14}}>
                {[
                  {l:"Costos de Soporte",        v:`$ ${Math.round(totalSoporte/1e6).toLocaleString()} M`, s:`${SOPORTE.length} unidades: ${SOPORTE.join(", ")}`, c:"#f97316"},
                  {l:"PE Sin Absorción",          v:`$ ${Math.round(peSimple/1e9*10)/10} MM`,              s:"Solo costos directos del P&G",         c:"#64748b"},
                  {l:"PE Con Absorción",          v:`$ ${Math.round(peConAbsorc/1e9*10)/10} MM`,           s:"Incluye cuota de soporte prorrateada",  c:"#eab308"},
                  {l:"Impacto Absorción",         v:`+$ ${Math.round(impactoAbsorc/1e9*10)/10} MM`,        s:`+${Math.round(impactoAbsorcPct*10)/10}% más que el PE simple`, c:"#ef4444"},
                  {l:"Ventas Reales",             v:`$ ${Math.round(TV/1e9*10)/10} MM`,                   s:`Margen s/PE absorbido: ${Math.round((TV-peConAbsorc)/TV*1000)/10}%`, c:"#22c55e"},
                  {l:"Soporte / Ventas",          v:`${Math.round(totalSoporte/TV*1000)/10}%`,             s:"Peso del soporte sobre ventas totales", c:"#a855f7"},
                ].map((k,i)=>(
                  <div key={i} style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",border:`1px solid ${k.c}33`,borderRadius:12,padding:"16px 18px",display:"flex",flexDirection:"column",gap:4}}>
                    <span style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em"}}>{k.l}</span>
                    <span style={{fontSize:20,fontWeight:700,color:k.c,fontFamily:"'Courier New',monospace"}}>{k.v}</span>
                    <span style={{fontSize:10,color:"#475569",lineHeight:1.4}}>{k.s}</span>
                  </div>
                ))}
              </div>

              {/* Distribución de soporte por unidad */}
              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Costos de Soporte por Unidad ($ millones)</h3>
                <p style={{margin:"0 0 16px",fontSize:11,color:"#475569"}}>Detalle de las unidades que generan costos sin ingresos propios</p>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  {SOPORTE.map((s,i)=>{
                    const g = sucGto[s]||0;
                    const pct = totalSoporte > 0 ? g/totalSoporte*100 : 0;
                    const cols = ["#f97316","#eab308","#a855f7","#3b82f6","#14b8a6"];
                    const c = cols[i % cols.length];
                    return (
                      <div key={s} style={{background:"#0a1628",border:`1px solid ${c}44`,borderRadius:10,padding:"14px 18px",flex:"1 1 160px",minWidth:160}}>
                        <div style={{fontSize:11,color:c,fontWeight:700,marginBottom:6}}>{s}</div>
                        <div style={{fontSize:20,color:"#e2e8f0",fontFamily:"monospace",fontWeight:700}}>$ {Math.round(g/1e6).toLocaleString()} M</div>
                        <div style={{marginTop:8,height:4,background:"#1e293b",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${pct}%`,height:"100%",background:c,borderRadius:2}}/>
                        </div>
                        <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{Math.round(pct*10)/10}% del soporte total</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Gráfico evolución mensual: PE simple vs PE absorbido vs Ventas */}
              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Evolución Mensual: Ventas vs PE Simple vs PE con Absorción ($ millones)</h3>
                <p style={{margin:"0 0 16px",fontSize:11,color:"#475569"}}>La brecha entre las dos líneas de PE muestra el impacto mensual de los costos de soporte</p>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={peEvol} margin={{top:10,right:20,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="mes" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${(v/1000).toFixed(0)} MM`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v,n)=>[`$ ${v.toLocaleString()} M`,n]}/>
                    <Legend wrapperStyle={{fontSize:11}}/>
                    <Bar dataKey="ventas" name="Ventas Reales" radius={[4,4,0,0]}>
                      {peEvol.map((d,i)=>(<Cell key={i} fill={d.superAbs?"#22c55e":"#ef4444"} fillOpacity={0.8}/>))}
                    </Bar>
                    <Bar dataKey="peSim"  name="PE Sin Absorción" fill="#64748b" fillOpacity={0.6} radius={[4,4,0,0]}/>
                    <Bar dataKey="peAbs"  name="PE Con Absorción" fill="#eab308" fillOpacity={0.7} radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              {/* Cuota de soporte mensual */}
              <div style={{background:"#0f172a",borderRadius:12,padding:20,border:"1px solid #1e293b"}}>
                <h3 style={{margin:"0 0 4px",fontSize:14,color:"#94a3b8",fontWeight:500}}>Cuota de Soporte Distribuida por Mes ($ millones)</h3>
                <p style={{margin:"0 0 16px",fontSize:11,color:"#475569"}}>Monto de costos de soporte absorbido cada mes, prorrateado según ventas del período</p>
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={peEvol} margin={{top:5,right:20,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="mes" tick={{fontSize:10,fill:"#64748b"}}/>
                    <YAxis tick={{fontSize:10,fill:"#64748b"}} tickFormatter={v=>`${v} M`}/>
                    <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:11}} formatter={(v,n)=>[`$ ${v.toLocaleString()} M`,n]}/>
                    <Bar dataKey="soporte" name="Soporte absorbido" fill="#f97316" fillOpacity={0.8} radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              {/* Tabla por sucursal */}
              <div style={{background:"#0f172a",borderRadius:12,border:"1px solid #1e293b",overflow:"hidden"}}>
                <div style={{padding:"14px 20px",borderBottom:"1px solid #1e293b",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <h3 style={{margin:0,fontSize:13,color:"#94a3b8",fontWeight:500}}>PE por Sucursal: Directo vs Con Absorción ($ millones)</h3>
                  <span style={{fontSize:11,color:"#475569"}}>Ordenado por ventas ↓</span>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:11,width:"100%",minWidth:950}}>
                    <thead>
                      <tr style={{background:"#0d1f35"}}>
                        {["Sucursal","Ventas","% Ventas","Cuota Soporte","PE Directo","PE c/Absorción","Δ PE","MS Directo","MS c/Absorción","Estado"].map(h=>(
                          <th key={h} style={{padding:"9px 12px",textAlign:h==="Sucursal"||h==="Estado"?"left":"right",color:"#64748b",fontWeight:600,borderBottom:"2px solid #334155",whiteSpace:"nowrap",fontSize:10}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {tablaSuc.map((d,i)=>(
                        <tr key={i} style={{background:i%2===0?"#050d1a":"#070f1e",borderBottom:"1px solid #0f172a"}}>
                          <td style={{padding:"9px 12px",color:"#e2e8f0",fontWeight:600,whiteSpace:"nowrap"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:3,height:16,borderRadius:2,background:d.superavitAbsorc?"#22c55e":"#ef4444"}}/>
                              {d.suc}
                            </div>
                          </td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace"}}>{Math.round(d.ventasSuc/1e6).toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#3b82f6",fontFamily:"monospace"}}>{d.pctVentas}%</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#f97316",fontFamily:"monospace"}}>{Math.round(d.cuota/1e6).toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#64748b",fontFamily:"monospace"}}>{d.peDirSuc.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#eab308",fontFamily:"monospace",fontWeight:700}}>{d.peAbsorcSuc.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:"#ef4444",fontFamily:"monospace"}}>+{(d.peAbsorcSuc-d.peDirSuc).toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",color:d.msDir>=0?"#22c55e":"#ef4444"}}>{d.msDir>=0?"+":""}{d.msDir.toLocaleString()}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:d.msAbsorc>=0?"#22c55e":"#ef4444"}}>{d.msAbsorc>=0?"+":""}{d.msAbsorc.toLocaleString()}</td>
                          <td style={{padding:"9px 12px"}}>
                            <div style={{display:"flex",flexDirection:"column",gap:3}}>
                              <span style={{background:d.superavitDir?"#22c55e11":"#ef444411",color:d.superavitDir?"#22c55e":"#ef4444",padding:"2px 8px",borderRadius:8,fontSize:9,fontWeight:700,whiteSpace:"nowrap"}}>
                                {d.superavitDir?"✅":"❌"} Directo
                              </span>
                              <span style={{background:d.superavitAbsorc?"#22c55e11":"#ef444411",color:d.superavitAbsorc?"#22c55e":"#ef4444",padding:"2px 8px",borderRadius:8,fontSize:9,fontWeight:700,whiteSpace:"nowrap"}}>
                                {d.superavitAbsorc?"✅":"⚠️"} Absorbido
                              </span>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr style={{background:"#0a1628",borderTop:"2px solid #334155"}}>
                        <td style={{padding:"10px 12px",color:"#e2e8f0",fontWeight:700}}>TOTAL</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace",fontWeight:700}}>{Math.round(TV/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#3b82f6",fontFamily:"monospace",fontWeight:700}}>100%</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#f97316",fontFamily:"monospace",fontWeight:700}}>{Math.round(totalSoporte/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#64748b",fontFamily:"monospace",fontWeight:700}}>{Math.round(peSimple/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#eab308",fontFamily:"monospace",fontWeight:700}}>{Math.round(peConAbsorc/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#ef4444",fontFamily:"monospace",fontWeight:700}}>+{Math.round(impactoAbsorc/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:"#22c55e",fontFamily:"monospace",fontWeight:700}}>{Math.round((TV-peSimple)/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px",textAlign:"right",color:TV>=peConAbsorc?"#22c55e":"#ef4444",fontFamily:"monospace",fontWeight:700}}>{Math.round((TV-peConAbsorc)/1e6).toLocaleString()}</td>
                        <td style={{padding:"10px 12px"}}>
                          <span style={{background:"#22c55e22",color:"#22c55e",padding:"3px 10px",borderRadius:10,fontSize:10,fontWeight:700}}>
                            {tablaSuc.filter(d=>d.superavitAbsorc).length}/{tablaSuc.length} suc.
                          </span>
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>

              {/* Nota metodológica */}
              <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:10,padding:"14px 18px",fontSize:11,color:"#475569",lineHeight:1.7}}>
                <strong style={{color:"#64748b"}}>📌 Metodología:</strong> Los costos fijos/variables se calculan según las proporciones del plan de cuentas (Fijo/Variable por cuenta).
                El CMV se trata como 100% variable. Los costos de soporte se consideran 100% fijos y se distribuyen entre sucursales
                <strong style={{color:"#94a3b8"}}> en proporción a sus ventas anuales</strong>.
                El Margen de Contribución global ({Math.round(mcGlobal*1000)/10}%) se aplica uniformemente a todas las sucursales
                por no disponer de desglose fijo/variable individual por sucursal.
              </div>
            </div>
          );
        })()}

        {/* ── SIMULADOR ── */}
        {tab==="simulador" && <SimuladorTab/>}


        {tab==="ctrl" && <CtrlPpto/>}

        {/* ── IA ── */}
        {tab==="ia" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <SectionTitle icon="🤖">Asesor Financiero IA</SectionTitle>
            <div style={{color:"#64748b",fontSize:13,marginBottom:-8}}>
              El asesor tiene acceso a todos los datos del ejercicio 2025: estado de resultados, top gastos, evolución mensual, análisis por sucursal y comparativos vs presupuesto.
            </div>
            <AIAdvisor pyg={pyg}/>
          </div>
        )}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
