const fmt = (n, decimals=0) => {
  if (n === undefined || n === null || isNaN(n)) return "-";
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toFixed(1) + " MM";   // miles de millones (≈ 10⁹)
  if (abs >= 1e6) return (n/1e6).toFixed(1) + " M";    // millones
  if (abs >= 1e3) return (n/1e3).toFixed(1) + " mil";  // miles
  return n.toLocaleString("es-AR", {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
};

const fmtFull = (n) => {
  if (n === undefined || n === null || isNaN(n)) return "-";
  return "$ " + Math.abs(n).toLocaleString("es-AR", {minimumFractionDigits: 0, maximumFractionDigits: 0});
};

function computePYG() {
  const rows = [];
  let totalVentasReal = 0, totalVentasProy = 0;
  let totalCMVReal = 0, totalCMVProy = 0;
  let totalGCReal = 0, totalGCProy = 0;
  let totalGAReal = 0, totalGAProy = 0;
  let totalGFReal = 0, totalGFProy = 0;
  let totalImpReal = 0, totalImpProy = 0;
  let totalOtrosReal = 0;

  MONTHS.forEach((m, i) => {
    const ventas = (RAW_DATA_SUMMARY.catPeriod["Ventas"][m]||0) + (RAW_DATA_SUMMARY.catPeriod["Otros Ingresos"][m]||0);
    const cmv = RAW_DATA_SUMMARY.catPeriod["Costo de Ventas"][m]||0;
    const gc = RAW_DATA_SUMMARY.catPeriod["Gastos Comerciales"][m]||0;
    const ga = RAW_DATA_SUMMARY.catPeriod["Gastos Administrativos"][m]||0;
    const gf = RAW_DATA_SUMMARY.catPeriod["Gastos Financieros"][m]||0;
    const imp = RAW_DATA_SUMMARY.catPeriod["Impuestos"][m]||0;

    const cmvP = RAW_DATA_SUMMARY.catProy["Costo de Ventas"][m]||0;
    const gcP = RAW_DATA_SUMMARY.catProy["Gastos Comerciales"][m]||0;
    const gaP = RAW_DATA_SUMMARY.catProy["Gastos Administrativos"][m]||0;
    const gfP = RAW_DATA_SUMMARY.catProy["Gastos Financieros"][m]||0;
    const impP = RAW_DATA_SUMMARY.catProy["Impuestos"][m]||0;

    const bm = ventas - cmv;
    const ebitda = bm - gc - ga;
    const ebit = ebitda - gf;
    const neto = ebit - imp;

    const bmP = -cmvP;
    const ebitdaP = bmP - gcP - gaP;
    const ebitP = ebitdaP - gfP;
    const netoP = ebitP - impP;

    rows.push({
      mes: MONTH_LABELS[i], periodo: m,
      ventasReal: ventas, cmvReal: cmv, bmReal: bm,
      gcReal: gc, gaReal: ga, ebitdaReal: ebitda,
      gfReal: gf, ebitReal: ebit,
      impReal: imp, netoReal: neto,
      cmvProy: cmvP, gcProy: gcP, gaProy: gaP, gfProy: gfP, impProy: impP,
      bmProy: bmP, ebitdaProy: ebitdaP, ebitProy: ebitP, netoProy: netoP
    });

    totalVentasReal += ventas;
    totalCMVReal += cmv; totalCMVProy += cmvP;
    totalGCReal += gc; totalGCProy += gcP;
    totalGAReal += ga; totalGAProy += gaP;
    totalGFReal += gf; totalGFProy += gfP;
    totalImpReal += imp; totalImpProy += impP;
  });

  const totalBMReal = totalVentasReal - totalCMVReal;
  const totalEBITDAReal = totalBMReal - totalGCReal - totalGAReal;
  const totalEBITReal = totalEBITDAReal - totalGFReal;
  const totalNetoReal = totalEBITReal - totalImpReal;

  const totalBMProy = -totalCMVProy;
  const totalEBITDAProy = totalBMProy - totalGCProy - totalGAProy;
  const totalEBITProy = totalEBITDAProy - totalGFProy;
  const totalNetoProy = totalEBITProy - totalImpProy;

  return {
    rows,
    totals: {
      ventasReal: totalVentasReal,
      cmvReal: totalCMVReal, cmvProy: totalCMVProy,
      gcReal: totalGCReal, gcProy: totalGCProy,
      gaReal: totalGAReal, gaProy: totalGAProy,
      gfReal: totalGFReal, gfProy: totalGFProy,
      impReal: totalImpReal, impProy: totalImpProy,
      bmReal: totalBMReal, bmProy: totalBMProy,
      ebitdaReal: totalEBITDAReal, ebitdaProy: totalEBITDAProy,
      ebitReal: totalEBITReal, ebitProy: totalEBITProy,
      netoReal: totalNetoReal, netoProy: totalNetoProy,
    }
  };
}

// Mapeo de cuentas por categoría P&G — con soporte de subcategorías
const ACCOUNT_DETAIL = (() => {
  const map = {};

  // Ventas — desglose por sucursal
  map["ventasReal"] = Object.entries(RAW_DATA_SUMMARY.ventasSucursalMes).map(([suc, meses]) => ({
    codigo:"SUC", nombre:suc, tipo:"sucursal",
    valores: Object.fromEntries(MONTHS.map((m,i)=>[MONTH_LABELS[i], Math.round(meses[m]||0)])),
    total: MONTHS.reduce((s,m)=>s+(meses[m]||0),0)
  })).sort((a,b)=>b.total-a.total);

  // Helper: obtener cuentas individuales de una categoría contable con valores proporcionales
  const getCuentas = (catName, totalOverride) => {
    const cuentas = RAW_DATA_SUMMARY.accountMap.filter(a => a.cat === catName);
    const totalCat = totalOverride ?? MONTHS.reduce((s,m)=>s+(RAW_DATA_SUMMARY.catPeriod[catName]?.[m]||0),0);
    return cuentas.map(c => {
      const tg = RAW_DATA_SUMMARY.topGastos.find(g => g.nombre === c.nombre);
      if (!tg) return null;
      const pct = totalCat > 0 ? tg.real / totalCat : 0;
      const valores = {};
      MONTH_LABELS.forEach((ml, i) => {
        valores[ml] = Math.round((RAW_DATA_SUMMARY.catPeriod[catName]?.[MONTHS[i]]||0) * pct);
      });
      return { codigo:c.codigo, nombre:c.nombre, cat:catName, area:c.area||"", clasif:c.clasif||"", tipo:"cuenta", valores, total:tg.real };
    }).filter(Boolean).sort((a,b)=>b.total-a.total);
  };

  // Costo de Ventas — una sola categoría
  map["cmvReal"] = { subcats: [
    { cat:"Costo de Ventas", cuentas: getCuentas("Costo de Ventas") }
  ]};

  // Gastos Comerciales — dos subcategorías
  map["gcReal"] = { subcats: [
    { cat:"Gastos Comerciales",  cuentas: getCuentas("Gastos Comerciales") },
    { cat:"Gastos de Cobranzas", cuentas: getCuentas("Gastos de Cobranzas") },
  ]};

  // Gastos Administrativos — Gastos de Personal + Gastos Administrativos
  map["gaReal"] = { subcats: [
    { cat:"Gastos de Personal",      cuentas: getCuentas("Gastos de Personal") },
    { cat:"Gastos Administrativos",  cuentas: getCuentas("Gastos Administrativos") },
  ]};

  // Gastos Financieros
  map["gfReal"] = { subcats: [
    { cat:"Gastos Financieros", cuentas: getCuentas("Gastos Financieros") }
  ]};

  return map;
})();

// ─────────────────────────────────────────────
// SIMULADOR DE SENSIBILIDAD — componente propio
// (necesita hooks, no puede ser IIFE inline)
// ─────────────────────────────────────────────
function SimuladorTab() {
          const catP = RAW_DATA_SUMMARY.catPeriod;
          const accountMap = RAW_DATA_SUMMARY.accountMap;

          // ── Base anual ──────────────────────────────────────────────
          const BASE = {
            ventas: MONTHS.reduce((s,m)=>s+(catP["Ventas"][m]||0),0),
            cmv:    MONTHS.reduce((s,m)=>s+(catP["Costo de Ventas"][m]||0),0),
            gc:     MONTHS.reduce((s,m)=>s+(catP["Gastos Comerciales"][m]||0),0),
            ga:     MONTHS.reduce((s,m)=>s+(catP["Gastos Administrativos"][m]||0),0),
            gf:     MONTHS.reduce((s,m)=>s+(catP["Gastos Financieros"][m]||0),0),
            imp:    MONTHS.reduce((s,m)=>s+(catP["Impuestos"][m]||0),0),
          };
          BASE.mb    = BASE.ventas - BASE.cmv;
          BASE.ebitda= BASE.mb - BASE.gc - BASE.ga;
          BASE.ebit  = BASE.ebitda - BASE.gf;
          BASE.neto  = BASE.ebit - BASE.imp;

          // PE base
          const calcPropFijo = (catName) => {
            const cc = accountMap.filter(a=>a.cat===catName && a.clasif);
            if(!cc.length) return 0.5;
            return cc.filter(a=>a.clasif==="Fijo").length / cc.length;
          };
          const pFijoGC = calcPropFijo("Gastos Comerciales");
          const pFijoGF = calcPropFijo("Gastos Financieros");
          const calcPE = (v,c,g,a,f) => {
            const fijo = g*pFijoGC + a*0.72 + f*pFijoGF;
            const vari = c + g*(1-pFijoGC) + a*0.28 + f*(1-pFijoGF);
            const mc   = v > 0 ? (v - vari)/v : 0;
            return mc > 0 ? fijo/mc : 0;
          };
          BASE.pe = calcPE(BASE.ventas, BASE.cmv, BASE.gc, BASE.ga, BASE.gf);

          // Costos soporte (para PE absorbido)
          const sucGto = RAW_DATA_SUMMARY.sucursales;
          const vps    = RAW_DATA_SUMMARY.ventasPorSucursal;
          const SOPORTE_TOTAL = Object.keys(sucGto).filter(s=>!vps[s]).reduce((s,k)=>s+(sucGto[k]||0),0);
          const calcPEabs = (v,c,g,a,f) => {
            const fijo = g*pFijoGC + a*0.72 + f*pFijoGF + SOPORTE_TOTAL;
            const vari = c + g*(1-pFijoGC) + a*0.28 + f*(1-pFijoGF);
            const mc   = v > 0 ? (v - vari)/v : 0;
            return mc > 0 ? fijo/mc : 0;
          };
          BASE.peAbs = calcPEabs(BASE.ventas, BASE.cmv, BASE.gc, BASE.ga, BASE.gf);

          // ── Sliders state ───────────────────────────────────────────
          const [dVentas, setDVentas] = useState(0);
          const [dCMV,    setDCMV]    = useState(0);
          const [dGC,     setDGC]     = useState(0);
          const [dGA,     setDGA]     = useState(0);
          const [dGF,     setDGF]     = useState(0);
          const [dImp,    setDImp]    = useState(0);

          // ── Escenarios guardados ─────────────────────────────────────
          const SCENARIOS = [
            { name:"Base",      icon:"📊", color:"#64748b", dV:0,   dC:0,   dG:0,   dA:0,   dF:0,   dI:0  },
            { name:"Optimista", icon:"🚀", color:"#22c55e", dV:15,  dC:-5,  dG:-5,  dA:-3,  dF:0,   dI:0  },
            { name:"Pesimista", icon:"⚠️", color:"#ef4444", dV:-10, dC:5,   dG:5,   dA:3,   dF:10,  dI:0  },
            { name:"Solo Ventas",icon:"📈",color:"#3b82f6", dV:20,  dC:0,   dG:0,   dA:0,   dF:0,   dI:0  },
            { name:"Eficiencia",icon:"⚙️", color:"#a855f7", dV:0,   dC:-8,  dG:-10, dA:-5,  dF:-5,  dI:0  },
          ];

          // ── Calcular resultado simulado ──────────────────────────────
          const apply = (base, pct) => base * (1 + pct/100);
          const sim = (dv, dc, dg, da, df, di) => {
            const v  = apply(BASE.ventas, dv);
            const c  = apply(BASE.cmv,    dc);
            const g  = apply(BASE.gc,     dg);
            const a  = apply(BASE.ga,     da);
            const f  = apply(BASE.gf,     df);
            const i  = apply(BASE.imp,    di);
            const mb = v - c;
            const eb = mb - g - a;
            const ei = eb - f;
            const n  = ei - i;
            return { v, c, g, a, f, i, mb, eb, ei, n,
              pe:    calcPE(v,c,g,a,f),
              peAbs: calcPEabs(v,c,g,a,f) };
          };

          const S = sim(dVentas, dCMV, dGC, dGA, dGF, dImp);
          const delta = (simV, baseV) => simV - baseV;
          const deltaPct = (simV, baseV) => baseV !== 0 ? (simV-baseV)/Math.abs(baseV)*100 : 0;

          // ── Datos para gráfico de tornado ────────────────────────────
          // Sensibilidad: impacto en neto de mover cada variable +10%

          const tornadoData = tornado.map(t => ({

// CONTROL PRESUPUESTARIO — componente propio

function CtrlPpto() {
  const MONTHS    = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const MON_LABEL = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const AREAS = [...new Set(Object.values(CTRL_PPTO).map(d=>d.a).filter(Boolean))].sort();
  const SUCS  = [...new Set(Object.values(CTRL_PPTO).flatMap(d=>Object.keys(d.s)))].sort();

  const [vista,   setVista]   = useState('empresa');   // 'empresa' | 'sucursal' | 'ranking'
  const [selSuc,  setSelSuc]  = useState(SUCS[3]);     // Corrientes default
  const [selArea, setSelArea] = useState('Todas');
  const [mesHasta,setMesHasta]= useState(11);           // 0-indexed, default Dic
  const [openArea, setOpenArea] = useState(null);       // drill-down empresa

  const AREA_COLORS = {
    'Comercial':'#22c55e','Compras':'#3b82f6','Logistica':'#f97316',
    'Operaciones':'#a855f7','Marketing':'#ec4899','Recursos Humanos':'#14b8a6',
    'Sistemas':'#6366f1','Gestoria':'#eab308','Finanzas':'#06b6d4',
    'Administracion':'#94a3b8','Administracion en Sucursales':'#cbd5e1','PostVenta':'#fb923c'
  };

  // ── helpers ──────────────────────────────────────────────────────────
  const sumR = (d, suc, hasta) =>
    MONTHS.slice(0, hasta+1).reduce((s,m) => s + (suc ? (d.s[suc]?.r?.[m]||0) : Object.values(d.s).reduce((a,v)=>a+(v.r?.[m]||0),0)), 0);
  const sumP = (d, suc, hasta) =>
    MONTHS.slice(0, hasta+1).reduce((s,m) => s + (suc ? (d.s[suc]?.p?.[m]||0) : Object.values(d.s).reduce((a,v)=>a+(v.p?.[m]||0),0)), 0);

  const desvio    = (r,p) => r - p;
  const desvPct   = (r,p) => p > 0 ? (r-p)/p*100 : r > 0 ? 100 : 0;
  const semaforo  = (pct, invert=false) => {
    const v = invert ? -pct : pct;
    if (v <= 5)  return '#22c55e';
    if (v <= 15) return '#eab308';
    return '#ef4444';
  };

  // ── Vista EMPRESA: por área ───────────────────────────────────────────
  const empresaData = AREAS.map(area => {
    const cuentas = Object.entries(CTRL_PPTO).filter(([,d])=>d.a===area);
    const r = cuentas.reduce((s,[,d])=>s+sumR(d,null,mesHasta),0);
    const p = cuentas.reduce((s,[,d])=>s+sumP(d,null,mesHasta),0);
    return { area, r, p, d: desvio(r,p), pct: desvPct(r,p), color: AREA_COLORS[area]||'#64748b', cuentas };
  }).filter(x=>x.r>0||x.p>0).sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));

  const totalEmp = empresaData.reduce((s,x)=>({r:s.r+x.r,p:s.p+x.p}),{r:0,p:0});

  // ── Vista SUCURSAL ────────────────────────────────────────────────────
  const sucData = Object.entries(CTRL_PPTO)
    .filter(([,d]) => (selArea==='Todas'||d.a===selArea) && d.s[selSuc])
    .map(([code,d]) => {
      const r = sumR(d, selSuc, mesHasta);
      const p = sumP(d, selSuc, mesHasta);
      return { code, nombre:d.n, area:d.a, cat:d.c, clasif:d.k, r, p, d:desvio(r,p), pct:desvPct(r,p) };
    })
    .filter(x=>x.r>0||x.p>0)
    .sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));

  const totalSuc = sucData.reduce((s,x)=>({r:s.r+x.r,p:s.p+x.p}),{r:0,p:0});

  // Evolución mensual acumulada para sucursal seleccionada
  const sucEvolData = MONTHS.slice(0,mesHasta+1).map((m,i) => {
    const r = Object.values(CTRL_PPTO).reduce((s,d)=>s+(d.s[selSuc]?.r?.[m]||0),0);
    const p = Object.values(CTRL_PPTO).reduce((s,d)=>s+(d.s[selSuc]?.p?.[m]||0),0);
    return { mes: MON_LABEL[i], r: Math.round(r/1e6), p: Math.round(p/1e6), d: Math.round((r-p)/1e6) };
  });

  // ── Vista RANKING: todas las sucursales ───────────────────────────────
  const rankingData = SUCS.map(suc => {
    const r = Object.values(CTRL_PPTO).reduce((s,d)=>s+sumR(d,suc,mesHasta),0);
    const p = Object.values(CTRL_PPTO).reduce((s,d)=>s+sumP(d,suc,mesHasta),0);
    const d = desvio(r,p);
    const pct = desvPct(r,p);
    return { suc, r, p, d, pct, color: semaforo(pct) };
  }).filter(x=>x.r>0||x.p>0).sort((a,b)=>b.pct-a.pct);

  // Ranking por área (empresa total)
  const rankingArea = empresaData.map(x=>({
    name: x.area, r: x.r, p: x.p, d: x.d, pct: x.pct,
    color: semaforo(x.pct), areaColor: x.color
  })).sort((a,b)=>b.pct-a.pct);

  // ── Shared header ─────────────────────────────────────────────────────
  const mesLabel = MON_LABEL[mesHasta];

  const Badge = ({txt, color}) => (
    <span style={{background:`${color}18`,color,border:`1px solid ${color}33`,
      padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:600,whiteSpace:'nowrap'}}>
      {txt}
    </span>
  );

  const DesvioCell = ({r, p, compact=false}) => {
    const d   = r - p;
    const pct = desvPct(r, p);
    const col = semaforo(pct);
    if (compact) return (
      <span style={{color:col,fontFamily:'monospace',fontWeight:700,fontSize:11}}>
        {pct>0?'+':''}{pct.toFixed(1)}%
      </span>
    );
    return (
      <div style={{display:'flex',flexDirection:'column',gap:1}}>
        <span style={{color:col,fontFamily:'monospace',fontWeight:700,fontSize:11}}>
          {d>=0?'+':''}{Math.round(d/1e6).toLocaleString()} M
        </span>
        <span style={{color:col,fontFamily:'monospace',fontSize:10,opacity:.8}}>
          ({pct>=0?'+':''}{pct.toFixed(1)}%)
        </span>
      </div>
    );
  };

  const SemaforoBar = ({pct, width=80}) => {
    const col = semaforo(pct);
    const w   = Math.min(Math.abs(pct)/30*100, 100);
    return (
      <div style={{width,height:5,background:'#1e293b',borderRadius:3,overflow:'hidden'}}>
        <div style={{width:`${w}%`,height:'100%',background:col,borderRadius:3,transition:'width .3s'}}/>
      </div>

  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <SectionTitle icon="📋">Control Presupuestario 2025</SectionTitle>

      {/* Controles superiores */}
      <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>

        <div style={{display:'flex',background:'#0f172a',borderRadius:8,border:'1px solid #1e293b',overflow:'hidden'}}>
          {[['empresa','🏢 Empresa'],['sucursal','🏬 Sucursal'],['ranking','🏆 Ranking']].map(([v,l])=>(
            <button key={v} onClick={()=>setVista(v)} style={{
              padding:'8px 16px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',

              transition:'all .15s'

          ))}
        </div>

        {/* Mes hasta */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:'6px 12px'}}>

          <select value={mesHasta} onChange={e=>setMesHasta(Number(e.target.value))}
            style={{background:'transparent',border:'none',color:'#e2e8f0',fontSize:12,fontWeight:600,cursor:'pointer',outline:'none'}}>
            {MON_LABEL.map((l,i)=><option key={i} value={i} style={{background:'#0f172a'}}>{l}</option>)}
          </select>
        </div>

        {/* Selector sucursal (solo en vista sucursal) */}
        {vista==='sucursal' && (
          <>
            <div style={{display:'flex',alignItems:'center',gap:8,background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:'6px 12px'}}>
              <span style={{fontSize:11,color:'#64748b'}}>Sucursal:</span>
              <select value={selSuc} onChange={e=>setSelSuc(e.target.value)}
                style={{background:'transparent',border:'none',color:'#e2e8f0',fontSize:12,fontWeight:600,cursor:'pointer',outline:'none'}}>
                {SUCS.map(s=><option key={s} value={s} style={{background:'#0f172a'}}>{s}</option>)}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:'6px 12px'}}>
              <span style={{fontSize:11,color:'#64748b'}}>Área:</span>
              <select value={selArea} onChange={e=>setSelArea(e.target.value)}

                <option value="Todas" style={{background:'#0f172a'}}>Todas las áreas</option>
                {AREAS.map(a=><option key={a} value={a} style={{background:'#0f172a'}}>{a}</option>)}
              </select>
            </div>
          </>
        )}
      </div>

              {l:'Total Presup.',  v:totalEmp.p, c:'#94a3b8'},

              {l:'Desvío %',       v:desvPct(totalEmp.r,totalEmp.p), c: semaforo(desvPct(totalEmp.r,totalEmp.p)), pct:true},
              {l:'Áreas sobre ppto',v:empresaData.filter(x=>x.pct>5).length, c:'#ef4444', raw:true, suf:` de ${empresaData.length}`},
              {l:'Áreas en ppto',   v:empresaData.filter(x=>x.pct<=5).length, c:'#22c55e', raw:true, suf:` de ${empresaData.length}`},
            ].map((k,i)=>(
              <div key={i} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e)',border:`1px solid ${k.c}33`,borderRadius:10,padding:'14px 16px'}}>

                </div>

          <div style={{background:'#0f172a',borderRadius:12,padding:20,border:'1px solid #1e293b'}}>

              <BarChart data={empresaData.map(x=>({
                name:x.area.length>14?x.area.slice(0,13)+'…':x.area,
                fullName:x.area,
                Real: Math.round(x.r/1e6),
                Presup: Math.round(x.p/1e6),

                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                <XAxis dataKey="name" tick={{fontSize:9,fill:'#94a3b8'}} angle={-30} textAnchor="end"/>
                <YAxis tick={{fontSize:10,fill:'#64748b'}} tickFormatter={v=>`${v} M`}/>
                <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:11}}
                  formatter={(v,n)=>[`$ ${v.toLocaleString()} M`,n]}
                  labelFormatter={(l,p)=>p?.[0]?.payload?.fullName||l}/>
                <Legend wrapperStyle={{fontSize:10}}/>
                <Bar dataKey="Real"   name="Real"        radius={[3,3,0,0]}>
                  {empresaData.map((x,i)=><Cell key={i} fill={x.color} fillOpacity={0.9}/>)}
                </Bar>
                <Bar dataKey="Presup" name="Presupuesto" fill="#334155" fillOpacity={0.6} radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Tabla por área con drill-down de cuentas */}
          <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',overflow:'hidden'}}>
            <div style={{padding:'12px 20px',background:'#0a1628',borderBottom:'1px solid #1e293b'}}>
              <h3 style={{margin:0,fontSize:13,color:'#94a3b8',fontWeight:500}}>Detalle por Área — clic en una fila para expandir cuentas</h3>
            </div>
            <table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}>
                  <thead>
                    <tr style={{background:'#0d1f35'}}>
                      {['Área','Real','Presupuesto','Desvío $','Desvío %','Semáforo',''].map(h=>(
                        <th key={h} style={{padding:'9px 14px',textAlign:h==='Área'?'left':'right',color:'#64748b',fontWeight:600,borderBottom:'2px solid #334155',fontSize:10,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {empresaData.map((x,i)=>{
                      const isOpen = openArea === x.area;
                      const cuentasArea = Object.entries(CTRL_PPTO)
                        .filter(([,d])=>d.a===x.area)
                        .map(([code,d])=>{
                          const r = sumR(d,null,mesHasta);
                          const p = sumP(d,null,mesHasta);
                          return {code,nombre:d.n,cat:d.c,r,p,d:r-p,pct:desvPct(r,p)};
                        }).filter(c=>c.r>0||c.p>0).sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
                      return (
                        <React.Fragment key={x.area}>
                          <tr onClick={()=>setOpenArea(isOpen?null:x.area)}
                            style={{background:isOpen?'#0d1f35':i%2===0?'#050d1a':'#070f1e',
                              cursor:'pointer',borderBottom:'1px solid #0f172a',transition:'background .15s'}}
                            onMouseEnter={e=>e.currentTarget.style.background='#1e293b'}
                            onMouseLeave={e=>e.currentTarget.style.background=isOpen?'#0d1f35':i%2===0?'#050d1a':'#070f1e'}>
                            <td style={{padding:'10px 14px'}}>
                              <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <div style={{width:3,height:18,borderRadius:2,background:x.color,flexShrink:0}}/>
                                <span style={{color:x.color,fontWeight:700}}>{x.area}</span>
                                <span style={{fontSize:10,color:'#334155'}}>({cuentasArea.length} ctás)</span>
                              </div>
                            </td>
                            <td style={{padding:'10px 14px',textAlign:'right',color:'#e2e8f0',fontFamily:'monospace'}}>{Math.round(x.r/1e6).toLocaleString()}</td>
                            <td style={{padding:'10px 14px',textAlign:'right',color:'#64748b',fontFamily:'monospace'}}>{Math.round(x.p/1e6).toLocaleString()}</td>
                            <td style={{padding:'10px 14px',textAlign:'right'}}><DesvioCell r={x.r} p={x.p}/></td>
                            <td style={{padding:'10px 14px',textAlign:'right'}}><DesvioCell r={x.r} p={x.p} compact/></td>
                            <td style={{padding:'10px 14px',textAlign:'right'}}>
                              <SemaforoBar pct={x.pct}/>
                            </td>
                            <td style={{padding:'10px 14px',textAlign:'center',color:'#64748b',fontSize:14}}>{isOpen?'▼':'▶'}</td>
                          </tr>
                          {isOpen && cuentasArea.map((c,j)=>(
                            <tr key={c.code} style={{background:'#0a1628',borderBottom:'1px solid #0f172a'}}>
                              <td style={{padding:'8px 14px 8px 32px',color:'#94a3b8',fontSize:11}}>
                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                  <span style={{color:'#334155',fontFamily:'monospace',fontSize:10}}>{c.code}</span>
                                  <span>{c.nombre}</span>
                                </div>
                              </td>
                              <td style={{padding:'8px 14px',textAlign:'right',color:'#e2e8f0',fontFamily:'monospace',fontSize:11}}>{Math.round(c.r/1e6).toLocaleString()}</td>
                              <td style={{padding:'8px 14px',textAlign:'right',color:'#64748b',fontFamily:'monospace',fontSize:11}}>{Math.round(c.p/1e6).toLocaleString()}</td>
                              <td style={{padding:'8px 14px',textAlign:'right'}}><DesvioCell r={c.r} p={c.p}/></td>
                              <td style={{padding:'8px 14px',textAlign:'right'}}><DesvioCell r={c.r} p={c.p} compact/></td>
                              <td style={{padding:'8px 14px',textAlign:'right'}}><SemaforoBar pct={c.pct} width={60}/></td>
                              <td/>
                            </tr>
                          ))}
                        </React.Fragment>
                      );
                    })}
                    {/* Total */}
                    <tr style={{background:'#0a1628',borderTop:'2px solid #334155'}}>
                      <td style={{padding:'10px 14px',color:'#e2e8f0',fontWeight:700}}>TOTAL EMPRESA</td>
                      <td style={{padding:'10px 14px',textAlign:'right',color:'#22c55e',fontFamily:'monospace',fontWeight:700}}>{Math.round(totalEmp.r/1e6).toLocaleString()}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',color:'#64748b',fontFamily:'monospace',fontWeight:700}}>{Math.round(totalEmp.p/1e6).toLocaleString()}</td>
                      <td style={{padding:'10px 14px',textAlign:'right'}}><DesvioCell r={totalEmp.r} p={totalEmp.p}/></td>
                      <td style={{padding:'10px 14px',textAlign:'right'}}><DesvioCell r={totalEmp.r} p={totalEmp.p} compact/></td>
                      <td/><td/>
                    </tr>
                  </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════
          VISTA SUCURSAL
      ════════════════════════════════════════ */}
      {vista==='sucursal' && (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* KPIs sucursal */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12}}>
            {[
              {l:'Total Real',    v:totalSuc.r, c:'#e2e8f0'},
              {l:'Total Presup.', v:totalSuc.p, c:'#94a3b8'},
              {l:'Desvío $',      v:totalSuc.r-totalSuc.p, c:semaforo(desvPct(totalSuc.r,totalSuc.p)), sign:true},
              {l:'Desvío %',      v:desvPct(totalSuc.r,totalSuc.p), c:semaforo(desvPct(totalSuc.r,totalSuc.p)), pct:true},
              {l:'Cuentas s/ppto',v:sucData.filter(x=>x.pct>15).length, c:'#ef4444', raw:true, suf:' cuentas'},
              {l:'Cuentas OK',    v:sucData.filter(x=>x.pct<=5).length,  c:'#22c55e', raw:true, suf:' cuentas'},
            ].map((k,i)=>(
              <div key={i} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e)',border:`1px solid ${k.c}33`,borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:10,color:'#64748b',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>{k.l}</div>
                <div style={{fontSize:18,fontWeight:700,color:k.c,fontFamily:'monospace'}}>
                  {k.pct?`${k.v>=0?'+':''}${k.v.toFixed(1)}%`
                   :k.raw?`${k.v}${k.suf||''}`
                   :`${k.sign&&k.v>=0?'+':''}$ ${Math.round(Math.abs(k.v)/1e6).toLocaleString()} M`}
                </div>
                <div style={{fontSize:9,color:'#334155',marginTop:2}}>{selSuc} · hasta {mesLabel}</div>
              </div>
            ))}
          </div>

          {/* Gráfico evolución mensual */}
          <div style={{background:'#0f172a',borderRadius:12,padding:20,border:'1px solid #1e293b'}}>
            <h3 style={{margin:'0 0 4px',fontSize:14,color:'#94a3b8',fontWeight:500}}>{selSuc} — Evolución mensual Real vs Presupuesto ($ millones)</h3>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={sucEvolData} margin={{top:5,right:20,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                <XAxis dataKey="mes" tick={{fontSize:10,fill:'#64748b'}}/>
                <YAxis tick={{fontSize:10,fill:'#64748b'}} tickFormatter={v=>`${v} M`}/>
                <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:11}}
                  formatter={(v,n)=>[`$ ${v.toLocaleString()} M`,n]}/>
                <Legend wrapperStyle={{fontSize:10}}/>
                <Bar dataKey="p" name="Presupuesto" fill="#334155" fillOpacity={0.7} radius={[3,3,0,0]}/>
                <Bar dataKey="r" name="Real" radius={[3,3,0,0]}>
                  {sucEvolData.map((d,i)=><Cell key={i} fill={d.r<=d.p?'#22c55e':'#ef4444'} fillOpacity={0.85}/>)}

          </div>

          <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',overflow:'hidden'}}>
            <div style={{padding:'12px 20px',background:'#0a1628',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

            <div style={{overflowX:'auto'}}>
